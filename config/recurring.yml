# Recurring jobs — only run in production (Railway worker)
# Solid Queue checks for an environment key first; if found, only those jobs run.

development: {}

test: {}

production:
  # Proactive session keepalive for all suppliers (especially Chef's Warehouse)
  refresh_sessions:
    class: RefreshAllSessionsJob
    queue: default
    schedule: "0 */2 * * *"
    description: "Refresh supplier sessions every 2 hours"

  # Expire old 2FA requests every 15 minutes (2FA happens rarely, no need for 5-min checks)
  expire_2fa_requests:
    class: Expire2faRequestsJob
    queue: low
    schedule: "*/15 * * * *"
    description: "Expire old 2FA requests every 15 minutes"

  # Daily catalog import via super_admin credentials (once per day, staggered)
  staggered_supplier_import:
    class: StaggeredSupplierImportJob
    queue: scraping
    schedule: "0 6 * * *"
    description: "Daily supplier product catalog import at 2 AM EST (6 AM UTC)"

  # Daily list/order guide sync for all organization credentials
  # Scheduled 3 hours after staggered import to avoid overlap —
  # a slow US Foods import can run 1-3 hours, and concurrent browser sessions
  # to the same supplier risk rate limiting and double memory usage.
  sync_all_lists:
    class: SyncAllListsJob
    queue: scraping
    schedule: "0 8 * * *"
    description: "Sync supplier lists/order guides once daily at 4 AM EST (8 AM UTC)"

  # Nightly demo environment reset (no-op unless DEMO_MODE=true)
  demo_nightly_reset:
    class: DemoResetJob
    queue: critical
    schedule: "0 5 * * *"
    description: "Reset demo environment to golden state (1 AM EST / 5 AM UTC)"

  # Daily cleanup: delete drafts older than Order::DRAFT_EXPIRY_DAYS (14 days by default)
  # Timer resets when the chef returns to checkout — see OrdersController#review.
  expire_drafts:
    class: ExpireDraftsJob
    queue: low
    schedule: "30 4 * * *"
    description: "Delete expired draft orders daily at 12:30 AM EST (4:30 AM UTC)"

  # Nightly full-catalog deep import — rotates ONE deep-capable supplier per night
  # (US Foods, What Chefs Want, Chef's Warehouse, Premiere Produce One), so each
  # refreshes roughly every few days. Paginates every category to exhaustion via
  # the supplier API — additive/reinstate-only, never discontinues. Runs at
  # midnight UTC (8 PM EST), well before the 6 AM shallow import, one at a time.
  staggered_deep_import:
    class: StaggeredDeepImportJob
    queue: scraping
    schedule: "0 0 * * *"
    description: "Nightly rotating full-catalog deep import (one supplier per night)"

  # Disabled — only run on explicit user request:
  #   DeepCatalogImportJob (manual single-supplier deep import: perform_later(supplier_id))
  #   DiscontinueStaleProductsJob (stale product cleanup — no value without frequent imports)
