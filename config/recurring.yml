# Recurring jobs — only run in production (Railway worker)
# Solid Queue checks for an environment key first; if found, only those jobs run.

development: {}

test: {}

production:
  # Proactive session keepalive for all suppliers (especially Chef's Warehouse)
  refresh_sessions:
    class: RefreshAllSessionsJob
    queue: default
    schedule: "0 */2 * * *"
    description: "Refresh supplier sessions every 2 hours"

  # Expire old 2FA requests every 15 minutes (2FA happens rarely, no need for 5-min checks)
  expire_2fa_requests:
    class: Expire2faRequestsJob
    queue: low
    schedule: "*/15 * * * *"
    description: "Expire old 2FA requests every 15 minutes"

  # Daily catalog import via super_admin credentials (once per day, staggered)
  staggered_supplier_import:
    class: StaggeredSupplierImportJob
    queue: scraping
    schedule: "0 4 * * *"
    description: "Daily supplier product catalog import at midnight EST (4 AM UTC)"

  # Daily list/order guide sync for all organization credentials
  # Scheduled 3 hours after staggered import to avoid overlap —
  # a slow US Foods import can run 1-3 hours, and concurrent browser sessions
  # to the same supplier risk rate limiting and double memory usage.
  sync_all_lists:
    class: SyncAllListsJob
    queue: scraping
    schedule: "0 7 * * *"
    description: "Sync supplier lists/order guides once daily at 3 AM EST (7 AM UTC)"

  # Nightly demo environment reset (no-op unless DEMO_MODE=true)
  demo_nightly_reset:
    class: DemoResetJob
    queue: critical
    schedule: "0 4 * * *"
    description: "Reset demo environment to golden state (midnight EST / 4 AM UTC)"

  # Disabled — only run on explicit user request:
  #   DeepCatalogImportJob (US Foods deep category browse — 1-3 hrs)
  #   DiscontinueStaleProductsJob (stale product cleanup — no value without frequent imports)
