default: &default
  dispatchers:
    - polling_interval: 5
      batch_size: 100
  # Memory: each worker entry is a full Rails process (~170MB idle). Three
  # processes instead of five — critical stays ISOLATED so order placement
  # (PlaceOrderJob) never shares threads with anything else; queues listed
  # first are polled first within a process.
  workers:
    - queues: [critical]
      threads: 2
      processes: 1
      polling_interval: 1
    - queues: [price_verification, default]
      threads: 4
      processes: 1
      polling_interval: 1
    - queues: [scraping, low]
      threads: 2
      processes: 1
      polling_interval: 5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
